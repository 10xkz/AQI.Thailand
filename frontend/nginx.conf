# ── Nginx configuration for the PM2.5 frontend container ────────────────────
#
# Responsibilities:
#   1. Serve index.html and static assets from /usr/share/nginx/html
#   2. Reverse-proxy /api/, /metrics, and /health to the FastAPI backend
#      (container name: backend, port: 8000 — resolved via Docker DNS)
#
# With this setup the browser always talks to ONE origin (Nginx on :80).
# No CORS headers are needed for normal operation.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Static frontend ───────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Root location - serves static files, falls back to index.html for SPA routing
    location / {
        try_files $uri $uri/ @fallback;
    }
    
    location @fallback {
        rewrite ^.*$ /index.html break;
    }

    # ── API proxy → FastAPI backend ───────────────────────────────────────────
    # Matches: /api/*, /metrics, /health, /docs, /redoc, /openapi.json
    location ~ ^/(api|metrics|health|docs|redoc|openapi\.json) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        # Forward real client info
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep connections alive for efficiency
        proxy_set_header   Connection        "";

        # Generous timeout for cold OpenAQ fetches
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "no-referrer"  always;

    # ── Cache static assets aggressively ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
