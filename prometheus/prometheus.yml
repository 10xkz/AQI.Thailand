# ── Prometheus configuration ─────────────────────────────────────────────────
#
# Scrapes the FastAPI backend's /metrics endpoint.
# The hostname "backend" is resolved via Docker's internal DNS
# (set by the container name in docker-compose.yml).
# ─────────────────────────────────────────────────────────────────────────────

global:
  # How often Prometheus collects metrics from all targets
  scrape_interval: 30s

  # How long Prometheus waits for a target to respond before timing out
  scrape_timeout: 10s

  # How often Prometheus evaluates alerting/recording rules
  evaluation_interval: 30s

  # Labels added to every time series and alert sent from this instance
  external_labels:
    environment: "development"
    project:     "pm25-monitor"
    region:      "thailand"

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  # 1. The FastAPI backend — our primary target
  - job_name: "pm25_backend"

    # Override the global interval for this job if desired
    scrape_interval: 30s

    # The /metrics path is Prometheus default, but we state it explicitly
    metrics_path: /metrics

    static_configs:
      - targets:
          - "backend:8000"     # container_name:port — Docker DNS resolves this
        labels:
          service: "fastapi-backend"
          language: "python"

  # 2. Prometheus self-monitoring (useful for dashboards)
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"
