apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm25-backend
  namespace: jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: rubchek/pm25-backend:latest
        envFrom:
        - secretRef:
            name: pm25-secrets