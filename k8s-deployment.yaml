# --- Backend ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm25-backend
spec:
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: rubchek/pm25-backend:latest
        envFrom:
        - secretRef:
            name: pm25-secrets # ใช้ Secret ตัวที่สร้างไว้แล้ว
---
# --- Frontend ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm25-frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: rubchek/pm25-frontend:latest
---
# --- Prometheus ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm25-prometheus
spec:
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
---
# --- Services backend ---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: jenkins
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

---
# --- Services frontend ---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: jenkins
spec:
  type: NodePort       
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80 
      targetPort: 80
      nodePort: 30080 